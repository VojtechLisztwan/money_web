<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Správa osobních financí</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen">

    <div id="login-section" class="flex flex-col items-center justify-center min-h-screen">
        <div class="bg-gray-800 p-8 rounded-xl shadow-lg w-96 border border-gray-700">
            <h1 class="text-2xl font-bold mb-6 text-center text-blue-400">Přihlášení do systému</h1>
            <input id="email" type="email" placeholder="Email" class="w-full mb-4 p-3 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-500 text-white">
            <input id="password" type="password" placeholder="Heslo" class="w-full mb-6 p-3 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-500 text-white">
            <button id="btnLogin" class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded font-bold mb-3 transition">Přihlásit se</button>
            <button id="btnRegister" class="w-full bg-gray-600 hover:bg-gray-500 p-3 rounded font-bold transition">Vytvořit účet</button>
            <p id="login-error" class="text-red-400 text-sm mt-4 hidden text-center"></p>
        </div>
    </div>

    <div id="app-section" class="hidden max-w-6xl mx-auto p-4 md:p-6 text-gray-100">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 border-b border-gray-700 pb-4 gap-4 text-gray-100">
            <h1 class="text-3xl font-bold text-blue-400 text-gray-100">Správa financí v8.0</h1>
            <div class="flex flex-wrap gap-4 items-center justify-center">
                <button onclick="switchTab('overview')" class="hover:text-blue-400 transition font-bold text-gray-100">Přehled</button>
                <button onclick="switchTab('analysis')" class="hover:text-blue-400 transition font-bold text-gray-100">Analýza</button>
                <button onclick="switchTab('recurring')" class="hover:text-blue-400 transition font-bold text-gray-100">Trvalé platby</button>
                <button onclick="switchTab('settings')" class="hover:text-blue-400 transition font-bold text-gray-400 text-gray-100">Nastavení</button>
                <button id="btnLogout" class="bg-red-600 hover:bg-red-700 px-4 py-1.5 rounded text-sm transition font-bold text-gray-100">Odhlásit</button>
            </div>
        </div>

        <div id="tab-overview" class="tab-content block">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div class="bg-gray-800 p-5 rounded-xl border border-gray-700">
                    <span class="text-gray-400 text-xs uppercase text-gray-100">Příjmy</span>
                    <div id="summary-income" class="text-2xl font-bold text-green-400">0 Kč</div>
                </div>
                <div class="bg-gray-800 p-5 rounded-xl border border-gray-700">
                    <span class="text-gray-400 text-xs uppercase text-gray-100">Výdaje</span>
                    <div id="summary-expense" class="text-2xl font-bold text-red-400">0 Kč</div>
                </div>
                <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 border-l-4 border-l-blue-500">
                    <span class="text-gray-400 text-xs uppercase text-gray-100">Zůstatek</span>
                    <div id="summary-balance" class="text-2xl font-bold text-blue-400">0 Kč</div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-6">
                <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 col-span-1 lg:col-span-1 h-fit">
                    <h2 id="formTitle" class="text-xl font-bold mb-4 text-gray-100">Nová transakce</h2>
                    <input type="hidden" id="editTxId">
                    <select id="txType" class="w-full mb-4 p-2 rounded bg-gray-700 border border-gray-600 text-white">
                        <option value="Výdaj">Výdaj</option>
                        <option value="Příjem">Příjem</option>
                    </select>
                    <select id="txCategorySelect" class="w-full mb-2 p-2 rounded bg-gray-700 border border-gray-600 text-white"></select>
                    <input id="txCategoryCustom" type="text" placeholder="Vlastní název..." class="w-full mb-4 p-2 rounded bg-gray-700 border border-gray-600 hidden text-white">
                    <input id="txAmount" type="number" placeholder="Částka (Kč)" class="w-full mb-4 p-2 rounded bg-gray-700 border border-gray-600 text-white">
                    <input id="txNote" type="text" placeholder="Poznámka" class="w-full mb-4 p-2 rounded bg-gray-700 border border-gray-600 text-white text-gray-100">
                    <div class="flex items-center mb-6">
                        <input id="txRecurring" type="checkbox" class="w-4 h-4 rounded">
                        <label for="txRecurring" class="ml-2 text-sm text-gray-400 text-gray-100">Opakovat měsíčně</label>
                    </div>
                    <button id="btnAddTx" class="w-full bg-green-600 hover:bg-green-700 p-3 rounded font-bold mb-2 text-gray-100">ULOŽIT</button>
                    <button id="btnCancelEdit" class="hidden w-full bg-gray-600 p-3 rounded font-bold text-gray-100">ZRUŠIT</button>
                </div>

                <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 col-span-1 lg:col-span-3">
                    <div class="flex justify-between items-center mb-4">
                        <select id="globalPeriodFilter" class="p-1.5 rounded bg-gray-700 border border-gray-600 text-sm text-gray-100">
                            <option value="current_month">Tento měsíc</option>
                            <option value="last_month">Minulý měsíc</option>
                            <option value="all" selected>Celá historie</option>
                        </select>
                        <button onclick="deleteSelected()" class="bg-red-600 hover:bg-red-700 px-3 py-1.5 rounded text-sm font-bold text-gray-100">Smazat vybrané</button>
                    </div>
                    <div class="overflow-x-auto max-h-[600px]">
                        <table class="w-full text-left border-collapse">
                            <thead class="sticky top-0 bg-gray-800">
                                <tr class="border-b border-gray-700 text-gray-400 text-xs text-gray-100">
                                    <th class="p-2 w-10 text-center text-gray-100"><input type="checkbox" id="selectAll" onclick="toggleSelectAll(this)"></th>
                                    <th class="p-2 text-gray-100">Datum</th>
                                    <th class="p-2 text-center text-gray-100">Typ</th>
                                    <th class="p-2 text-gray-100">Kategorie</th>
                                    <th class="p-2 text-right text-gray-100">Částka</th>
                                    <th class="p-2 text-center text-gray-100">Akce</th>
                                </tr>
                            </thead>
                            <tbody id="txTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-analysis" class="tab-content hidden">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 h-fit">
                    <h2 class="text-xl font-bold mb-4 text-blue-400 text-gray-100">Souhrn období</h2>
                    <div id="analysisSummary" class="text-gray-300 font-mono text-sm bg-gray-900 p-4 rounded border border-gray-700 whitespace-pre-wrap text-gray-100"></div>
                </div>
                <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 col-span-1 md:col-span-2 space-y-8">
                    <div class="h-[300px]"><canvas id="expenseChart"></canvas></div>
                    <div class="h-[300px]"><canvas id="trendChart"></canvas></div>
                </div>
            </div>
        </div>

        <div id="tab-recurring" class="tab-content hidden">
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                <h2 class="text-xl font-bold mb-4 text-blue-400 text-gray-100">Správa trvalých plateb</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-gray-700 text-gray-400 text-sm text-gray-100">
                                <th class="p-2 text-gray-100">Kategorie</th>
                                <th class="p-2 text-right text-gray-100">Částka</th>
                                <th class="p-2 text-gray-100">Poznámka</th>
                                <th class="p-2 text-center text-gray-100">Akce</th>
                            </tr>
                        </thead>
                        <tbody id="recurringTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-settings" class="tab-content hidden">
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 max-w-xl">
                <h2 class="text-xl font-bold mb-4 text-gray-100">Import dat</h2>
                <input type="file" id="importFile" accept=".json" class="mb-4 block w-full text-sm text-gray-400">
                <button id="btnImport" class="bg-purple-600 px-6 py-2 rounded font-bold text-gray-100">Nahrát JSON</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, serverTimestamp, orderBy, doc, deleteDoc, updateDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // --- KONFIGURACE FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyDOODjOh7NNc1pJyLgr68MNTDH1V4ep57k",
            authDomain: "uctenkovani.firebaseapp.com",
            projectId: "uctenkovani",
            storageBucket: "uctenkovani.firebasestorage.app",
            messagingSenderId: "112014852298",
            appId: "1:112014852298:web:f40a8bfd946bdef4983433"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- WHITELIST EMAILŮ ---
        const allowedEmails = ["tvuj.email@seznam.cz"]; // SEM DOPLŇ SVŮJ EMAIL!
        
        const defaultCategories = {
            "Výdaj": ["Jídlo", "Bydlení", "Doprava", "Zábava"],
            "Příjem": ["Mzda", "Investice", "Dar"]
        };

        let currentUser = null;
        let allTx = [];
        let expChart = null, trendChart = null;

        window.switchTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(e => e.classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
            if(id === 'analysis') render();
        };

        // --- AUTH ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('app-section').classList.remove('hidden');
                init();
            } else {
                document.getElementById('login-section').classList.remove('hidden');
                document.getElementById('app-section').classList.add('hidden');
            }
        });

        document.getElementById('btnLogin').addEventListener('click', async () => {
            try { await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value); }
            catch (e) { alert("Chyba přihlášení."); }
        });

        document.getElementById('btnRegister').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            if (!allowedEmails.includes(email)) return alert("Tento email není povolen.");
            try { await createUserWithEmailAndPassword(auth, email, document.getElementById('password').value); }
            catch (e) { alert(e.message); }
        });

        document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));

        // --- CORE LOGIKA ---
        function init() {
            updateCats();
            const q = query(collection(db, "transactions"), where("userId", "==", currentUser.uid), orderBy("createdAt", "desc"));
            onSnapshot(q, (snap) => {
                allTx = [];
                snap.forEach(d => {
                    let data = d.data(); data.id = d.id;
                    data.dateObj = data.createdAt ? data.createdAt.toDate() : new Date();
                    allTx.push(data);
                });
                render();
            });
        }

        const txType = document.getElementById('txType');
        const catSel = document.getElementById('txCategorySelect');
        const catCust = document.getElementById('txCategoryCustom');

        function updateCats() {
            catSel.innerHTML = "";
            defaultCategories[txType.value].forEach(c => {
                let o = document.createElement("option"); o.value = c; o.textContent = c; catSel.appendChild(o);
            });
            let o = document.createElement("option"); o.value = "Ostatní"; o.textContent = "Ostatní..."; catSel.appendChild(o);
            checkCust();
        }
        function checkCust() { catCust.classList.toggle("hidden", catSel.value !== "Ostatní"); }
        txType.onchange = updateCats; catSel.onchange = checkCust;

        document.getElementById('btnAddTx').onclick = async () => {
            const editId = document.getElementById('editTxId').value;
            const amount = parseFloat(document.getElementById('txAmount').value);
            const category = catSel.value === "Ostatní" ? catCust.value : catSel.value;
            const data = {
                userId: currentUser.uid, type: txType.value, category, amount,
                note: document.getElementById('txNote').value,
                recurring: document.getElementById('txRecurring').checked
            };
            if (editId) await updateDoc(doc(db, "transactions", editId), data);
            else { data.createdAt = serverTimestamp(); await addDoc(collection(db, "transactions"), data); }
            cancelEdit();
        };

        window.deleteTx = async (id) => { if(confirm("Opravdu smazat?")) await deleteDoc(doc(db, "transactions", id)); };
        
        window.deleteSelected = async () => {
            const selected = document.querySelectorAll('.tx-checkbox:checked');
            if (selected.length === 0 || !confirm(`Smazat ${selected.length} položek?`)) return;
            const batch = writeBatch(db);
            selected.forEach(cb => batch.delete(doc(db, "transactions", cb.value)));
            await batch.commit();
        };

        window.toggleSelectAll = (src) => document.querySelectorAll('.tx-checkbox').forEach(cb => cb.checked = src.checked);

        window.editTx = (id) => {
            const t = allTx.find(x => x.id === id);
            switchTab('overview');
            document.getElementById('editTxId').value = t.id;
            txType.value = t.type; updateCats();
            if (defaultCategories[t.type].includes(t.category)) catSel.value = t.category;
            else { catSel.value = "Ostatní"; checkCust(); catCust.value = t.category; }
            document.getElementById('txAmount').value = t.amount;
            document.getElementById('txNote').value = t.note || "";
            document.getElementById('txRecurring').checked = t.recurring;
            document.getElementById('btnAddTx').textContent = "AKTUALIZOVAT";
            document.getElementById('btnCancelEdit').classList.remove('hidden');
        };

        function cancelEdit() {
            document.getElementById('editTxId').value = "";
            document.getElementById('btnAddTx').textContent = "ULOŽIT";
            document.getElementById('btnCancelEdit').classList.add('hidden');
            document.getElementById('txAmount').value = ""; document.getElementById('txNote').value = "";
        }
        document.getElementById('btnCancelEdit').onclick = cancelEdit;

        window.dupRec = async (id) => {
            const t = allTx.find(x => x.id === id);
            await addDoc(collection(db, "transactions"), { ...t, id:null, createdAt: serverTimestamp() });
        };

        function render() {
            const filter = document.getElementById('globalPeriodFilter').value;
            const now = new Date();
            let filtered = allTx;
            if (filter === 'current_month') filtered = allTx.filter(t => t.dateObj.getMonth() === now.getMonth() && t.dateObj.getFullYear() === now.getFullYear());
            if (filter === 'last_month') { let m=now.getMonth()-1, y=now.getFullYear(); if(m<0){m=11;y--;} filtered = allTx.filter(t => t.dateObj.getMonth() === m && t.dateObj.getFullYear() === y); }

            let inc = 0, exp = 0, cats = {}, trend = {};
            const txBody = document.getElementById('txTableBody');
            const recBody = document.getElementById('recurringTableBody');
            txBody.innerHTML = ""; recBody.innerHTML = "";

            allTx.forEach(t => {
                const isInc = t.type === "Příjem";
                const color = isInc ? "text-green-400" : "text-red-400";
                if (filtered.includes(t)) {
                    isInc ? inc += t.amount : exp += t.amount;
                    if (!isInc) cats[t.category] = (cats[t.category] || 0) + t.amount;
                    txBody.innerHTML += `<tr class="border-b border-gray-700 text-sm">
                        <td class="p-2 text-center"><input type="checkbox" value="${t.id}" class="tx-checkbox"></td>
                        <td class="p-2 text-gray-400">${t.dateObj.toLocaleDateString('cs-CZ')}</td>
                        <td class="p-2 text-center ${color}">${t.type[0]}</td>
                        <td class="p-2">${t.category}</td>
                        <td class="p-2 text-right font-bold">${t.amount.toLocaleString()}</td>
                        <td class="p-2 text-center"><button onclick="editTx('${t.id}')">✏️</button></td></tr>`;
                }
                const mKey = t.dateObj.getFullYear() + "-" + (t.dateObj.getMonth()+1);
                if(!trend[mKey]) trend[mKey] = {i:0, e:0};
                isInc ? trend[mKey].i += t.amount : trend[mKey].e += t.amount;

                if (t.recurring) {
                    recBody.innerHTML += `<tr class="border-b border-gray-700 text-sm">
                        <td class="p-2">${t.category}</td>
                        <td class="p-2 text-right font-bold">${t.amount.toLocaleString()} Kč</td>
                        <td class="p-2 text-gray-500 text-xs">${t.note || ""}</td>
                        <td class="p-2 text-center whitespace-nowrap">
                            <button onclick="dupRec('${t.id}')" class="bg-green-700 px-2 py-1 rounded text-xs mr-1 font-bold">+ Dnes</button>
                            <button onclick="deleteTx('${t.id}')" class="bg-red-800 px-2 py-1 rounded text-xs font-bold">Zrušit</button>
                        </td></tr>`;
                }
            });

            document.getElementById('summary-income').textContent = inc.toLocaleString() + " Kč";
            document.getElementById('summary-expense').textContent = exp.toLocaleString() + " Kč";
            document.getElementById('summary-balance').textContent = (inc - exp).toLocaleString() + " Kč";

            const sorted = Object.entries(cats).sort((a,b)=>b[1]-a[1]);
            let s = `BILANCE ZA OBDOBÍ\n------------------\nPříjmy:   ${inc.toLocaleString()} Kč\nVýdaje:   ${exp.toLocaleString()} Kč\nZůstatek: ${(inc-exp).toLocaleString()} Kč\n\nKATEGORIE VÝDAJŮ:\n`;
            sorted.forEach(([c, v]) => s += `${c.padEnd(12)}: ${v.toLocaleString()} Kč\n`);
            document.getElementById('analysisSummary').textContent = s;

            if (expChart) expChart.destroy();
            expChart = new Chart(document.getElementById('expenseChart'), {
                type: 'doughnut',
                data: { labels: Object.keys(cats), datasets: [{ data: Object.values(cats), backgroundColor: ['#ef4444', '#f97316', '#eab308', '#22c55e', '#3b82f6'] }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: {color:'#fff'} } } }
            });
            
            if (trendChart) trendChart.destroy();
            const months = Object.keys(trend).sort();
            trendChart = new Chart(document.getElementById('trendChart'), {
                type: 'bar',
                data: { labels: months, datasets: [
                    { label: 'Příjmy', data: months.map(m=>trend[m].i), backgroundColor: '#4ade80' },
                    { label: 'Výdaje', data: months.map(m=>trend[m].e), backgroundColor: '#f87171' }
                ]},
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: {color:'#fff'} } } }
            });
        }

        document.getElementById('globalPeriodFilter').onchange = render;

        // --- IMPORT Z JSON ---
        document.getElementById('btnImport').onclick = () => {
            const file = document.getElementById('importFile').files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const data = JSON.parse(e.target.result);
                let count = 0;
                for (const t of data) {
                    let d = new Date();
                    if (t.date) { const p = t.date.split('.'); d = new Date(p[2], p[1]-1, p[0]); }
                    await addDoc(collection(db, "transactions"), {
                        userId: currentUser.uid, type: t.type||"Výdaj", category: t.category||"Ostatní",
                        amount: parseFloat(t.amount)||0, note: t.note||"",
                        recurring: t.recurring === "Ano", createdAt: d
                    });
                    count++;
                }
                alert("Úspěšně naimportováno " + count + " transakcí.");
                switchTab('overview');
            };
            reader.readAsText(file);
        };
    </script>
</body>
</html>
